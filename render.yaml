# Blueprint de Render — crea el servicio del bot con 1 clic desde el dashboard.
# Dashboard → Blueprints → New Blueprint Instance → apuntar a este repo.
services:
  - type: web
    name: pichangueros-bot
    runtime: docker
    plan: starter            # ~$7/mes, always-on (necesario para mantener la sesión)
    region: oregon
    dockerfilePath: ./Dockerfile
    # Sin healthCheckPath a propósito: el bot mantiene una conexión persistente
    # y durante el arranque de Chromium el chequeo HTTP puede fallar y disparar
    # reinicios en loop. Render igual detecta el puerto abierto.
    autoDeploy: true
    disk:
      name: wwebjs-auth      # guarda la sesión de WhatsApp → se escanea el QR UNA sola vez
      mountPath: /app/.wwebjs_auth
      sizeGB: 1
    envVars:
      - key: SAFE_MODE
        value: "true"        # MODO SEGURO: el cerebro solo atiende a ALLOWED_TESTERS
      - key: TEST_TRIGGER
        value: "ping kipi"
      - key: OPENAI_MODEL
        value: "gpt-4o-mini" # modelo económico (decisión del proyecto)
      - key: OPENAI_API_KEY
        sync: false          # setear en el dashboard (sin key el cerebro queda apagado)
      - key: ALLOWED_TESTERS
        sync: false          # ej. "51999888777,51988877766" (solo dígitos, con 51)
      - key: NOTIFY_NUMBER
        sync: false          # recibe avisos de leads/handoffs y usa comandos "kipi ..."
